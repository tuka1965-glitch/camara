name: Gerar BERTopic

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bertopic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-bertopic.txt
      - name: Instalar dependencias
        run: python -m pip install -r requirements-bertopic.txt
      - name: Gerar topicos BERTopic
        run: python scripts/build-bertopic.py
      - name: Avaliar contra temas oficiais
        shell: pwsh
        run: ./scripts/evaluate-topic-model.ps1
      - name: Calcular entropia cruzada
        shell: pwsh
        run: ./scripts/evaluate-topic-cross-entropy.ps1
      - name: Commitar resultado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza topicos BERTopic"
          file_pattern: docs/data/bertopic-model.json docs/data/bertopic-evaluation.json docs/data/bertopic-cross-entropy.json
